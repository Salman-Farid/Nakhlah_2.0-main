name: nakhlah
description: "Nakhlah 2.0 Arabic learning mobile app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.7.2
  http: ^1.6.0
  get_storage: ^2.1.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  url_launcher: ^6.3.2
  flutter_svg: ^2.2.3
  font_awesome_flutter: ^10.7.0
  share_plus: ^12.0.1
  google_sign_in: ^6.2.2
  just_audio: ^0.10.5
  fl_chart: ^0.70.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/nakhlah_web/
    - assets/nakhlah_web/icons/
    - assets/nakhlah_web/mp3/
    - assets/nakhlah_design/
