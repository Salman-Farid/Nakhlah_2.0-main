<svg viewBox="0 0 80 104" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mascotGradient" x1="40" y1="8" x2="40" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="hsl(263, 70%, 70%)" />
      <stop offset="100%" stop-color="hsl(263, 70%, 58%)" />
    </linearGradient>
  </defs>

  <!-- Drop shadow -->
  <ellipse cx="40" cy="98" rx="20" ry="5" fill="rgba(0,0,0,0.15)" />

  <!-- Body - Water drop shape -->
  <path d="M40 8 C55 28 68 45 68 62 C68 78 55 90 40 90 C25 90 12 78 12 62 C12 45 25 28 40 8Z" fill="url(#mascotGradient)" />

  <!-- Highlight -->
  <ellipse cx="28" cy="45" rx="8" ry="12" fill="rgba(255,255,255,0.3)" />

  <!-- Left arm -->
  <ellipse cx="8" cy="65" rx="6" ry="10" fill="url(#mascotGradient)" />
  <!-- Right arm -->
  <ellipse cx="72" cy="65" rx="6" ry="10" fill="url(#mascotGradient)" />

  <!-- Eyes -->
  <!-- Left eye white -->
  <ellipse cx="30" cy="55" rx="6" ry="7" fill="white" />
  <!-- Right eye white -->
  <ellipse cx="50" cy="55" rx="6" ry="7" fill="white" />
  <!-- Left pupil -->
  <circle cx="31" cy="56" r="3.5" fill="#1a1a2e" />
  <!-- Right pupil -->
  <circle cx="51" cy="56" r="3.5" fill="#1a1a2e" />
  <!-- Left eye shine -->
  <circle cx="32" cy="54" r="1.5" fill="white" />
  <!-- Right eye shine -->
  <circle cx="52" cy="54" r="1.5" fill="white" />

  <!-- Blush -->
  <ellipse cx="20" cy="65" rx="5" ry="3" fill="#FDA4AF" opacity="0.6" />
  <ellipse cx="60" cy="65" rx="5" ry="3" fill="#FDA4AF" opacity="0.6" />

  <!-- Mouth - happy smile -->
  <path d="M32 70 Q40 78 48 70" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round" fill="none" />
</svg>
